name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl3-dev libsdl3-image-dev libsdl3-mixer-dev libglm-dev

      - name: Build
        run: |
          cmake -B build_linux -DCMAKE_BUILD_TYPE=Release
          cmake --build build_linux

      - name: Package
        run: |
          cd build_linux
          zip -r ../sdl3-demo-linux.zip sdl3-demo resources/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: sdl3-demo-linux.zip

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies via vcpkg
        run: vcpkg install sdl3 sdl3-image sdl3-mixer glm --triplet x64-windows

      - name: Build
        run: |
          cmake -B build_win -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"
          cmake --build build_win --config Release

      - name: Package
        run: Compress-Archive -Path "build_win\Release\*" -DestinationPath "sdl3-demo-windows.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: sdl3-demo-windows.zip
